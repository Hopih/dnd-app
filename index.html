<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>D&D Hero Forge</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a227; --gold-light: #f0c040; --gold-dark: #8b6914;
  --parchment: #f5e6c8; --ink: #1a0f00; --blood: #8b1a1a;
  --bg: #0d0804; --panel: #1a1008; --border: #3d2a0a;
  --green: #2d6a2d; --green-light: #4CAF50;
  --shadow: #0a0500;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Crimson Text', Georgia, serif; background: var(--bg); color: var(--parchment); min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse at 20% 20%, rgba(201,162,39,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(139,26,26,0.08) 0%, transparent 50%),
              url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9a227' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
}
.container { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 16px 14px 60px; }

/* NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(10,5,0,0.97); border-top: 1px solid var(--border);
  display: flex; max-width: 480px; margin: 0 auto;
}
.nav-btn {
  flex: 1; padding: 10px 4px 8px; border: none; background: none;
  color: rgba(245,230,200,0.35); cursor: pointer; transition: all 0.2s;
  font-family: 'Cinzel Decorative', serif; font-size: 8px; letter-spacing: 0.5px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.nav-btn .nav-icon { font-size: 18px; }
.nav-btn.active { color: var(--gold-light); }
.nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px rgba(240,192,64,0.6)); }

/* HEADER */
.header { text-align: center; margin-bottom: 20px; }
.ornament { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
.ornament-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.ornament-diamond { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }
.header h1 { font-family: 'Cinzel Decorative', serif; font-size: 18px; font-weight: 900; color: var(--gold-light); text-shadow: 0 0 20px rgba(201,162,39,0.5); letter-spacing: 2px; line-height: 1.3; }
.header-sub { font-style: italic; color: rgba(245,230,200,0.4); font-size: 12px; margin-top: 3px; }

/* PANEL */
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 14px; position: relative; overflow: hidden; }
.panel::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold-dark), var(--gold), var(--gold-dark), transparent); }
.panel-title { font-family: 'Cinzel Decorative', serif; font-size: 10px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.panel-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
label { font-size: 10px; color: rgba(245,230,200,0.45); letter-spacing: 1px; text-transform: uppercase; font-family: 'Cinzel Decorative', serif; }
input[type="text"], select { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 3px; color: var(--parchment); font-family: 'Crimson Text', serif; font-size: 14px; padding: 7px 9px; outline: none; -webkit-appearance: none; width: 100%; transition: border-color 0.2s; }
input:focus, select:focus { border-color: var(--gold-dark); }
select option { background: #1a1008; }

/* BUTTONS */
.btn-random { width: 100%; padding: 10px; background: none; border: 1px dashed var(--border); border-radius: 4px; color: rgba(245,230,200,0.35); font-family: 'Cinzel Decorative', serif; font-size: 9px; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; margin-top: 4px; }
.btn-random:hover { border-color: var(--gold-dark); color: var(--gold); }
.btn-generate { width: 100%; padding: 15px; background: linear-gradient(135deg, #2a1a00, #4a2e00); border: 1px solid var(--gold-dark); border-radius: 4px; color: var(--gold-light); font-family: 'Cinzel Decorative', serif; font-size: 12px; letter-spacing: 3px; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; margin-top: 6px; }
.btn-generate::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 30%, rgba(201,162,39,0.15) 50%, transparent 70%); transform: translateX(-100%); transition: transform 0.6s; }
.btn-generate:hover::before { transform: translateX(100%); }
.btn-generate:active { transform: scale(0.98); }
.btn-save { width: 100%; padding: 11px; background: rgba(201,162,39,0.1); border: 1px solid var(--gold-dark); border-radius: 4px; color: var(--gold); font-family: 'Cinzel Decorative', serif; font-size: 9px; letter-spacing: 2px; cursor: pointer; margin-top: 10px; transition: all 0.3s; }
.btn-save:hover { background: rgba(201,162,39,0.2); }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.stat-box { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 4px; padding: 8px 6px; text-align: center; }
.stat-name { font-family: 'Cinzel Decorative', serif; font-size: 7px; color: rgba(245,230,200,0.35); letter-spacing: 1px; margin-bottom: 3px; }
.stat-value { font-family: 'Cinzel Decorative', serif; font-size: 20px; color: var(--gold-light); font-weight: 700; line-height: 1; }
.stat-mod { font-size: 11px; color: rgba(245,230,200,0.45); margin-top: 1px; }

/* CHARACTER CARD */
.char-card { background: linear-gradient(135deg, #1a1008 0%, #0d0804 100%); border: 1px solid var(--gold-dark); border-radius: 6px; padding: 18px; position: relative; overflow: hidden; }
.char-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at center, rgba(201,162,39,0.04) 0%, transparent 60%); pointer-events: none; }
.char-avatar { width: 72px; height: 72px; margin: 0 auto 14px; position: relative; }
.char-avatar-frame { width: 72px; height: 72px; border: 2px solid var(--gold-dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); font-size: 32px; position: relative; z-index: 1; }
.char-avatar::before, .char-avatar::after { content: '✦'; position: absolute; color: var(--gold-dark); font-size: 9px; top: 50%; transform: translateY(-50%); }
.char-avatar::before { left: -12px; }
.char-avatar::after { right: -12px; }
.char-name { font-family: 'Cinzel Decorative', serif; font-size: 16px; color: var(--gold-light); text-align: center; margin-bottom: 3px; text-shadow: 0 0 20px rgba(201,162,39,0.3); }
.char-subtitle { text-align: center; font-style: italic; color: rgba(245,230,200,0.45); font-size: 12px; margin-bottom: 14px; }
.char-divider { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
.char-divider span { color: var(--gold-dark); font-size: 10px; flex-shrink: 0; }
.char-divider::before, .char-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.trait-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.trait-item { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 3px; padding: 7px 9px; }
.trait-label { font-family: 'Cinzel Decorative', serif; font-size: 7px; color: var(--gold-dark); letter-spacing: 1px; margin-bottom: 2px; }
.trait-value { font-size: 13px; color: var(--parchment); }
.backstory-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-left: 2px solid var(--gold-dark); border-radius: 3px; padding: 10px; font-style: italic; font-size: 13px; line-height: 1.6; color: rgba(245,230,200,0.75); }
.backstory-box.ai-loading { opacity: 0.5; animation: pulse 1.5s infinite; }
.hp-bar-container { margin-top: 12px; }
.hp-bar-label { display: flex; justify-content: space-between; font-family: 'Cinzel Decorative', serif; font-size: 8px; color: var(--gold-dark); margin-bottom: 3px; letter-spacing: 1px; }
.hp-bar { height: 6px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
.hp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blood), #c0392b); border-radius: 2px; transition: width 1s ease; }
.skills-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.skill-tag { background: rgba(201,162,39,0.1); border: 1px solid rgba(201,162,39,0.2); border-radius: 20px; padding: 2px 9px; font-size: 11px; color: rgba(245,230,200,0.65); }

/* INVENTORY */
.inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.inv-item { background: rgba(0,0,0,0.35); border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; display: flex; align-items: center; gap: 8px; }
.inv-item-icon { font-size: 20px; flex-shrink: 0; }
.inv-item-info { flex: 1; min-width: 0; }
.inv-item-name { font-size: 13px; color: var(--parchment); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.inv-item-type { font-size: 10px; color: rgba(245,230,200,0.35); font-style: italic; }
.inv-item.rare { border-color: rgba(201,162,39,0.4); }
.inv-item.rare .inv-item-name { color: var(--gold-light); }

/* DICE SECTION */
.dice-arena { text-align: center; padding: 10px 0; }
.dice-display { font-size: 80px; margin: 10px 0; display: inline-block; transition: transform 0.1s; cursor: pointer; user-select: none; filter: drop-shadow(0 0 10px rgba(201,162,39,0.3)); }
.dice-display.rolling { animation: diceRoll 0.8s ease-out; }
@keyframes diceRoll {
  0% { transform: rotate(0deg) scale(1); }
  20% { transform: rotate(180deg) scale(1.3); }
  40% { transform: rotate(360deg) scale(0.8); }
  60% { transform: rotate(540deg) scale(1.2); }
  80% { transform: rotate(700deg) scale(0.9); }
  100% { transform: rotate(720deg) scale(1); }
}
.dice-result { font-family: 'Cinzel Decorative', serif; font-size: 48px; color: var(--gold-light); text-shadow: 0 0 30px rgba(201,162,39,0.6); min-height: 60px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
.dice-result.crit { color: #ff6b6b; text-shadow: 0 0 30px rgba(255,107,107,0.6); animation: critFlash 0.5s ease; }
.dice-result.nat20 { color: #ffd700; text-shadow: 0 0 40px rgba(255,215,0,0.8); animation: nat20Flash 1s ease; }
@keyframes critFlash { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes nat20Flash { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
.dice-label { font-family: 'Cinzel Decorative', serif; font-size: 10px; color: rgba(245,230,200,0.4); letter-spacing: 2px; margin-bottom: 16px; }
.dice-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 14px; }
.dice-btn { padding: 10px 6px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 4px; color: rgba(245,230,200,0.6); font-family: 'Cinzel Decorative', serif; font-size: 10px; cursor: pointer; transition: all 0.2s; }
.dice-btn:hover, .dice-btn.active { border-color: var(--gold-dark); color: var(--gold-light); background: rgba(201,162,39,0.1); }
.roll-history { margin-top: 14px; }
.roll-entry { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(61,42,10,0.4); font-size: 13px; color: rgba(245,230,200,0.5); }
.roll-entry .roll-val { font-family: 'Cinzel Decorative', serif; color: var(--gold); font-size: 14px; }
.roll-entry .roll-val.crit { color: #ff6b6b; }
.roll-entry .roll-val.nat { color: #ffd700; }

/* COMBAT */
.combat-arena { }
.monster-card { background: linear-gradient(135deg, #1a0808, #0d0404); border: 1px solid #5a1a1a; border-radius: 6px; padding: 16px; text-align: center; margin-bottom: 14px; position: relative; overflow: hidden; }
.monster-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #8b1a1a, #c0392b, #8b1a1a, transparent); }
.monster-emoji { font-size: 56px; margin-bottom: 8px; display: block; }
.monster-name { font-family: 'Cinzel Decorative', serif; font-size: 14px; color: #e74c3c; margin-bottom: 4px; }
.monster-hp-bar { height: 8px; background: rgba(0,0,0,0.5); border: 1px solid #5a1a1a; border-radius: 4px; overflow: hidden; margin-top: 8px; }
.monster-hp-fill { height: 100%; background: linear-gradient(90deg, #8b1a1a, #e74c3c); transition: width 0.5s ease; border-radius: 3px; }
.monster-hp-label { display: flex; justify-content: space-between; font-family: 'Cinzel Decorative', serif; font-size: 8px; color: rgba(231,76,60,0.6); margin-bottom: 3px; letter-spacing: 1px; }
.combat-log { background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 4px; padding: 10px; height: 110px; overflow-y: auto; margin-bottom: 12px; }
.log-entry { font-size: 12px; padding: 2px 0; line-height: 1.5; }
.log-entry.hero { color: var(--gold); }
.log-entry.monster { color: #e74c3c; }
.log-entry.system { color: rgba(245,230,200,0.4); font-style: italic; }
.log-entry.crit-log { color: #ffd700; font-weight: bold; }
.combat-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.combat-btn { padding: 12px; border-radius: 4px; font-family: 'Cinzel Decorative', serif; font-size: 10px; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; border: 1px solid; }
.combat-btn.attack { background: rgba(139,26,26,0.3); border-color: #8b1a1a; color: #e74c3c; }
.combat-btn.attack:hover { background: rgba(139,26,26,0.5); }
.combat-btn.special { background: rgba(201,162,39,0.15); border-color: var(--gold-dark); color: var(--gold); }
.combat-btn.special:hover { background: rgba(201,162,39,0.25); }
.combat-btn.flee { background: rgba(0,0,0,0.3); border-color: var(--border); color: rgba(245,230,200,0.4); grid-column: 1/-1; padding: 8px; font-size: 9px; }
.combat-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.hero-combat-hp { display: flex; gap: 10px; margin-bottom: 12px; }
.combat-hp-box { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 4px; padding: 8px; text-align: center; }
.combat-hp-label { font-family: 'Cinzel Decorative', serif; font-size: 8px; color: var(--gold-dark); letter-spacing: 1px; margin-bottom: 4px; }
.combat-hp-val { font-family: 'Cinzel Decorative', serif; font-size: 18px; color: var(--gold-light); }
.combat-hp-val.low { color: #e74c3c; }
.monster-select-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.monster-select-btn { background: rgba(0,0,0,0.4); border: 1px solid #5a1a1a; border-radius: 4px; padding: 10px 6px; text-align: center; cursor: pointer; transition: all 0.2s; }
.monster-select-btn:hover { border-color: #c0392b; background: rgba(139,26,26,0.2); }
.monster-select-btn .ms-emoji { font-size: 24px; margin-bottom: 4px; }
.monster-select-btn .ms-name { font-family: 'Cinzel Decorative', serif; font-size: 8px; color: rgba(231,76,60,0.7); letter-spacing: 0.5px; }

/* SAVED */
.saved-char { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 11px 13px; margin-bottom: 9px; display: flex; align-items: center; gap: 11px; cursor: pointer; transition: border-color 0.2s; }
.saved-char:hover { border-color: var(--gold-dark); }
.saved-char-emoji { font-size: 22px; }
.saved-char-info { flex: 1; }
.saved-char-name { font-family: 'Cinzel Decorative', serif; font-size: 11px; color: var(--gold-light); margin-bottom: 2px; }
.saved-char-sub { font-size: 11px; color: rgba(245,230,200,0.35); font-style: italic; }
.empty-state { text-align: center; padding: 40px 20px; color: rgba(245,230,200,0.2); font-style: italic; }
.empty-state-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.25; }

/* LOADING */
.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(13,8,4,0.92); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
.loading-overlay.visible { display: flex; }
.loading-dice { font-size: 44px; animation: spin 0.8s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.loading-text { font-family: 'Cinzel Decorative', serif; color: var(--gold); font-size: 11px; letter-spacing: 3px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* SECTION */
.section { display: none; }
.section.active { display: block; animation: fadeInUp 0.35s ease; }
@keyframes fadeInUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

/* VICTORY/DEFEAT */
.battle-result { text-align: center; padding: 20px; }
.battle-result-icon { font-size: 56px; margin-bottom: 10px; }
.battle-result-title { font-family: 'Cinzel Decorative', serif; font-size: 16px; margin-bottom: 8px; }
.battle-result-title.victory { color: var(--gold-light); }
.battle-result-title.defeat { color: #e74c3c; }
.battle-result-text { font-style: italic; color: rgba(245,230,200,0.6); font-size: 13px; margin-bottom: 16px; }
.xp-badge { display: inline-block; background: rgba(201,162,39,0.15); border: 1px solid var(--gold-dark); border-radius: 20px; padding: 4px 14px; font-family: 'Cinzel Decorative', serif; font-size: 11px; color: var(--gold); margin-bottom: 14px; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--shadow); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-dice">🎲</div>
  <div class="loading-text" id="loading-text">СУДЬБА РЕШАЕТСЯ...</div>
</div>

<div class="container">
  <div class="header">
    <div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>
    <h1>HERO FORGE</h1>
    <div class="header-sub">Dungeons & Dragons · 5th Edition</div>
    <div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>
  </div>

  <!-- CREATE -->
  <div class="section active" id="sec-create">
    <div class="panel">
      <div class="panel-title">Имя героя</div>
      <input type="text" id="char-name-input" placeholder="Введи имя или оставь пустым...">
      <button class="btn-random" onclick="randomName()" style="margin-top:8px">🎲 Случайное имя</button>
    </div>
    <div class="panel">
      <div class="panel-title">Происхождение</div>
      <div class="form-grid">
        <div class="form-group"><label>Раса</label>
          <select id="race-select">
            <option value="">🎲 Случайно</option>
            <option>Человек</option><option>Эльф</option><option>Дварф</option>
            <option>Полурослик</option><option>Гном</option><option>Полуэльф</option>
            <option>Полуорк</option><option>Тифлинг</option><option>Дракорождённый</option>
          </select>
        </div>
        <div class="form-group"><label>Класс</label>
          <select id="class-select">
            <option value="">🎲 Случайно</option>
            <option>Варвар</option><option>Бард</option><option>Жрец</option>
            <option>Друид</option><option>Воин</option><option>Монах</option>
            <option>Паладин</option><option>Следопыт</option><option>Плут</option>
            <option>Колдун</option><option>Волшебник</option>
          </select>
        </div>
        <div class="form-group"><label>Мировоззрение</label>
          <select id="align-select">
            <option value="">🎲 Случайно</option>
            <option>Законопослушный добрый</option><option>Нейтральный добрый</option>
            <option>Хаотичный добрый</option><option>Истинно нейтральный</option>
            <option>Хаотичный нейтральный</option><option>Законопослушный злой</option>
            <option>Нейтральный злой</option><option>Хаотичный злой</option>
          </select>
        </div>
        <div class="form-group"><label>Предыстория</label>

function switchTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

  document.getElementById('sec-'+tab).classList.add('active');

}

// ── GENERATE CHARACTER ────────────────────────────────
async function generateCharacter() {
  const loading = document.getElementById('loading');
  document.getElementById('loading-text').textContent = 'СУДЬБА РЕШАЕТСЯ...';
  loading.classList.add('visible');

  await new Promise(r=>setTimeout(r,600));

  const name = document.getElementById('char-name-input').value.trim() ||
               `${rand(Math.random()>.5?NAMES_M:NAMES_F)} ${rand(SURNAMES)}`;
  const race = document.getElementById('race-select').value || rand(RACES);
  const cls = document.getElementById('class-select').value || rand(CLASSES);
  const alignment = document.getElementById('align-select').value || rand(ALIGNMENTS);
  const background = document.getElementById('bg-select').value || rand(BACKGROUNDS);
  const stats = {STR:roll4d6(),DEX:roll4d6(),CON:roll4d6(),INT:roll4d6(),WIS:roll4d6(),CHA:roll4d6()};
  const con_mod = Math.floor((stats.CON-10)/2);
  const maxHp = (CLASS_HP[cls]||8)+con_mod;
  const level = randInt(1,5);
  const inv = INVENTORY[cls]||INVENTORY['Воин'];

  currentChar = {name,race,cls,alignment,background,stats,maxHp,currentHp:maxHp,skills:CLASS_SKILLS[cls]||[],level,emoji:CLASS_EMOJI[cls]||'⚔️',inv,backstory:'...',xp:0};

  loading.classList.remove('visible');
  renderCharacter(currentChar);

  document.getElementById('nav-char').style.display='flex';
  switchTab('char', document.getElementById('nav-char'));

  // Generate AI backstory
  generateAIBackstory(currentChar);
}

  'Дварф':['Клан изгнал его за нарушение древней традиции. Несёт позор снаружи, гордость внутри.','Единственный выживший после обрушения шахты. Слышит голоса погибших братьев в каждом камне.'],

function getBackstory(char) {
  const byClass = BACKSTORIES_BY_CLASS[char.cls] || [];
  const byRace = BACKSTORIES_BY_RACE[char.race] || [];
  const all = [...byClass, ...byRace];
  // Mix class and race backstories for uniqueness
  if (Math.random() < 0.3 && byRace.length > 0) return rand(byRace);
  return rand(byClass) || rand(byRace) || 'История этого героя ещё не написана — она творится прямо сейчас.';
}

function generateAIBackstory(char) {
  // No AI — use rich static pool
  const el = document.getElementById('ai-backstory');
  if (!el) return;
  el.textContent = getBackstory(char);
  if (currentChar) currentChar.backstory = el.textContent;
}

// ── RENDER CHARACTER ──────────────────────────────────

  const inv = c.inv||INVENTORY[c.cls]||[];
  const html = `
  <div class="char-card">
    <div class="char-avatar"><div class="char-avatar-frame">${c.emoji}</div></div>
    <div class="char-name">${c.name}</div>
    <div class="char-subtitle">${c.race} · ${c.cls} · ${c.level} уровень</div>
    <div class="char-divider"><span>✦</span></div>
    <div class="trait-grid">
      <div class="trait-item"><div class="trait-label">Мировоззрение</div><div class="trait-value">${c.alignment}</div></div>
      <div class="trait-item"><div class="trait-label">Предыстория</div><div class="trait-value">${c.background}</div></div>
    </div>
    <div class="char-divider"><span>⚔</span></div>
    <div class="stats-grid">
      ${Object.entries(c.stats).map(([n,v])=>`<div class="stat-box"><div class="stat-name">${n}</div><div class="stat-value">${v}</div><div class="stat-mod">${modifier(v)}</div></div>`).join('')}
    </div>
    <div class="hp-bar-container">
      <div class="hp-bar-label"><span>ХИТЫ</span><span>${c.maxHp} макс.</span></div>
      <div class="hp-bar"><div class="hp-bar-fill" style="width:100%"></div></div>
    </div>
    <div class="char-divider"><span>✦</span></div>
    <div class="panel-title">Навыки</div>
    <div class="skills-list">${c.skills.map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div>
    <div class="char-divider"><span>✦</span></div>
    <div class="panel-title">Инвентарь</div>
    <div class="inventory-grid">
      ${inv.map(i=>`<div class="inv-item${i.r?' rare':''}"><div class="inv-item-icon">${i.e}</div><div class="inv-item-info"><div class="inv-item-name">${i.n}</div><div class="inv-item-type">${i.t}${i.r?' · Редкий':''}</div></div></div>`).join('')}
    </div>
    <div class="char-divider"><span>✦</span></div>
    <div class="panel-title">Предыстория</div>
    <div class="backstory-box" id="ai-backstory">${c.backstory||'История этого героя ещё не написана...'}</div>
  </div>
  ${!saved?`<button class="btn-save" onclick="saveCharacter()">📜 Сохранить в отряд</button>`:''}
  `;

}

function saveCharacter() {
  if (!currentChar) return;
  const saved = JSON.parse(localStorage.getItem('dnd_chars')||'[]');
  currentChar.savedAt = Date.now();
  saved.unshift(currentChar);
  if (saved.length>10) saved.pop();
  localStorage.setItem('dnd_chars', JSON.stringify(saved));
  const btn = document.querySelector('.btn-save');
  if (btn) { btn.textContent='✅ Сохранено!'; btn.style.color='#4CAF50'; setTimeout(()=>{btn.textContent='📜 Сохранить в отряд';btn.style.color='';},2000); }
  if (tg) tg.HapticFeedback?.notificationOccurred('success');
}

// ── DICE ──────────────────────────────────────────────
const DICE_EMOJIS = {4:'🎲',6:'🎲',8:'🎲',10:'🎲',12:'🎲',20:'🎲',100:'🎲'};

function selectDice(n, btn) {
  currentDice = n;
  document.querySelectorAll('.dice-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('dice-type-label').textContent = `БРОСОК d${n}`;
  document.getElementById('dice-result').textContent = '?';
  document.getElementById('dice-result').className = 'dice-result';
}

function rollDice() {
  const diceEl = document.getElementById('dice-emoji');
  const resEl = document.getElementById('dice-result');
  diceEl.classList.remove('rolling');
  void diceEl.offsetWidth;
  diceEl.classList.add('rolling');
  if (tg) tg.HapticFeedback?.impactOccurred('medium');

  const result = roll(currentDice);
  setTimeout(()=>{
    resEl.textContent = result;
    resEl.className = 'dice-result';
    let label = `d${currentDice}`;
    if (currentDice===20 && result===20) { resEl.classList.add('nat20'); resEl.textContent='20 ✨'; label='НАТ 20!'; if(tg) tg.HapticFeedback?.notificationOccurred('success'); }
    else if (currentDice===20 && result===1) { resEl.classList.add('crit'); label='КРИТ ПРОВАЛ!'; if(tg) tg.HapticFeedback?.notificationOccurred('error'); }
    addRollHistory(result, currentDice);
  }, 820);
}

function rollAdvantage() {
  const a = roll(20), b = roll(20), result = Math.max(a,b);
  const resEl = document.getElementById('dice-result');
  const diceEl = document.getElementById('dice-emoji');
  diceEl.classList.remove('rolling'); void diceEl.offsetWidth; diceEl.classList.add('rolling');
  if (tg) tg.HapticFeedback?.impactOccurred('heavy');
  setTimeout(()=>{
    resEl.className='dice-result';
    resEl.textContent = `${result}`;
    document.getElementById('dice-type-label').textContent = `ПРЕИМУЩЕСТВО (${a} / ${b})`;
    if (result===20) { resEl.classList.add('nat20'); if(tg) tg.HapticFeedback?.notificationOccurred('success'); }
    addRollHistory(result, 20, true);
  },820);
}

function addRollHistory(val, dice, adv=false) {
  rollHistory.unshift({val,dice,adv,time:new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})});
  if (rollHistory.length>8) rollHistory.pop();
  const el = document.getElementById('roll-history');
  el.innerHTML = rollHistory.map(r=>{
    let cls=''; let suffix='';
    if(r.dice===20&&r.val===20){cls='nat';suffix=' ✨';}
    else if(r.dice===20&&r.val===1){cls='crit';}
    return `<div class="roll-entry"><span>${r.adv?'Преимущество':('d'+r.dice)} · ${r.time}</span><span class="roll-val ${cls}">${r.val}${suffix}</span></div>`;
  }).join('');
}

// ── COMBAT ────────────────────────────────────────────
function renderMonsterSelect() {
  const el = document.getElementById('monster-select');
  if (!el) return;
  el.innerHTML = MONSTERS.map((m,i)=>`
    <div class="monster-select-btn" onclick="startCombat(${i})">
      <div class="ms-emoji">${m.e}</div>
      <div class="ms-name">${m.n}</div>
      <div style="font-size:9px;color:rgba(231,76,60,0.4);margin-top:2px">HP: ${m.hp}</div>
    </div>`).join('');
}

function startCombat(idx) {
  if (!currentChar) {
    document.getElementById('combat-content').innerHTML = `
      <div class="panel"><div style="text-align:center;padding:20px;font-style:italic;color:rgba(245,230,200,0.4)">
        Сначала создай персонажа!<br><br>
        <button class="btn-generate" onclick="switchTab('create', document.querySelector('.nav-btn'))" style="font-size:10px;padding:10px">⚔️ Создать героя</button>
      </div></div>`;
    return;
  }
  const m = MONSTERS[idx];
  combatState = {
    monster:{...m,currentHp:m.hp},
    heroHp: currentChar.maxHp,
    heroMaxHp: currentChar.maxHp,
    log:[],
    turn:0,
    over:false
  };
  renderCombat();
}

function renderCombat() {
  const s = combatState;
  const m = s.monster;
  const mPct = Math.max(0,Math.round(m.currentHp/m.hp*100));
  const hPct = Math.max(0,Math.round(s.heroHp/s.heroMaxHp*100));
  const doc = document.getElementById('combat-content');

  doc.innerHTML = `
    <div class="monster-card">
      <div style="font-size:10px;font-family:'Cinzel Decorative',serif;color:rgba(231,76,60,0.5);letter-spacing:2px;margin-bottom:6px">${m.desc}</div>
      <span class="monster-emoji">${m.e}</span>
      <div class="monster-name">${m.n}</div>
      <div class="monster-hp-label"><span>ЗДОРОВЬЕ</span><span>${Math.max(0,m.currentHp)} / ${m.hp}</span></div>
      <div class="monster-hp-bar"><div class="monster-hp-fill" style="width:${mPct}%"></div></div>
    </div>
    <div class="hero-combat-hp">
      <div class="combat-hp-box">
        <div class="combat-hp-label">ГЕРОЙ</div>
        <div class="combat-hp-val ${s.heroHp<s.heroMaxHp*0.3?'low':''}">${s.heroHp} / ${s.heroMaxHp}</div>
      </div>
      <div class="combat-hp-box">
        <div class="combat-hp-label">ХОД</div>
        <div class="combat-hp-val">${s.turn+1}</div>
      </div>
    </div>
    <div class="panel" style="padding:10px">
      <div class="panel-title">Журнал боя</div>
      <div class="combat-log" id="combat-log">
        ${s.log.length===0?'<div class="log-entry system">Бой начинается...</div>':s.log.slice(-8).map(l=>`<div class="log-entry ${l.type}">${l.text}</div>`).join('')}
      </div>
    </div>
    <div class="combat-btns">
      <button class="combat-btn attack" onclick="combatAction('attack')" ${s.over?'disabled':''}>⚔️ Атака</button>
      <button class="combat-btn special" onclick="combatAction('special')" ${s.over?'disabled':''}>✨ Спецудар</button>
      <button class="combat-btn flee" onclick="combatAction('flee')" ${s.over?'disabled':''}>🏃 Отступить</button>
    </div>
  `;

  const log = document.getElementById('combat-log');
  if (log) log.scrollTop = log.scrollHeight;
}

function combatAction(action) {
  const s = combatState;
  if (s.over) return;
  if (tg) tg.HapticFeedback?.impactOccurred('medium');

  const m = s.monster;
  const strMod = Math.floor((currentChar.stats.STR-10)/2);
  const dexMod = Math.floor((currentChar.stats.DEX-10)/2);

  if (action==='flee') {
    const fleeRoll = roll(20)+dexMod;
    if (fleeRoll>=10) {
      s.log.push({type:'system',text:`🏃 ${currentChar.name} спасается бегством! (бросок: ${fleeRoll})`});
      s.over=true;
      renderCombat();
      setTimeout(()=>showCombatResult('flee'),500);
    } else {
      s.log.push({type:'system',text:`❌ Побег провалился! (бросок: ${fleeRoll})`});
      monsterAttack(s, m);
    }
    s.turn++;
    renderCombat();
    return;
  }

  // Hero attack
  const atkRoll = roll(20);
  let heroLog = '';
  if (atkRoll===1) {
    heroLog = `💔 ${currentChar.name} промахивается! (1 — крит. провал)`;
    s.log.push({type:'crit-log',text:heroLog});
  } else {
    let dmg = 0;
    if (action==='special') {
      dmg = roll(12)+roll(8)+strMod+2;
      const isCrit = atkRoll===20;
      if (isCrit) dmg *= 2;
      heroLog = `${isCrit?'⭐ КРИТИЧЕСКИЙ ':''} ✨ ${currentChar.name} применяет спецудар! Урон: ${dmg}`;
      s.log.push({type:'hero',text:heroLog});
    } else {
      dmg = roll(8)+strMod;
      const isCrit = atkRoll===20;
      if (isCrit) dmg *= 2;
      heroLog = `${isCrit?'⭐ КРИТ! ':''} ⚔️ ${currentChar.name} атакует! Урон: ${dmg} (бросок: ${atkRoll})`;
      s.log.push({type:'hero',text:heroLog});
    }
    m.currentHp -= dmg;
  }

  if (m.currentHp<=0) {
    m.currentHp=0;
    s.over=true;
    s.log.push({type:'system',text:`💀 ${m.n} повержен!`});
    renderCombat();
    setTimeout(()=>showCombatResult('victory'),600);
    return;
  }

  // Monster attacks back
  monsterAttack(s,m);
  s.turn++;
  renderCombat();

  if (s.heroHp<=0) {
    s.heroHp=0;
    s.over=true;
    renderCombat();
    setTimeout(()=>showCombatResult('defeat'),600);
  }
}

function monsterAttack(s,m) {
  const atkRoll = roll(20);
  if (atkRoll<=3) {
    s.log.push({type:'monster',text:`🌀 ${m.n} промахивается мимо!`});
  } else {
    const dmg = randInt(m.atk[0],m.atk[1]);
    s.heroHp = Math.max(0, s.heroHp-dmg);
    s.log.push({type:'monster',text:`🩸 ${m.n} атакует! Урон: ${dmg}`});
  }
}

function showCombatResult(type) {
  const m = combatState.monster;
  const xp = m.xp;
  let html='';
  if (type==='victory') {
    html=`<div class="battle-result">
      <div class="battle-result-icon">🏆</div>
      <div class="battle-result-title victory">ПОБЕДА!</div>
      <div class="battle-result-text">${currentChar.name} одолел ${m.n}!</div>
      <div class="xp-badge">+${xp} XP</div><br>
      <button class="btn-generate" onclick="resetCombat()" style="font-size:10px;padding:10px;margin-top:12px">⚔️ Новый бой</button>
    </div>`;
    if (tg) tg.HapticFeedback?.notificationOccurred('success');
  } else if (type==='defeat') {
    html=`<div class="battle-result">
      <div class="battle-result-icon">💀</div>
      <div class="battle-result-title defeat">ГЕРОЙ ПАЛ</div>
      <div class="battle-result-text">${currentChar.name} был сражён ${m.n}...</div>
      <button class="btn-generate" onclick="resetCombat()" style="font-size:10px;padding:10px;margin-top:12px;border-color:#8b1a1a;color:#e74c3c">🔄 Попробовать снова</button>
    </div>`;
    if (tg) tg.HapticFeedback?.notificationOccurred('error');
  } else {
    resetCombat(); return;
  }
  document.getElementById('combat-content').innerHTML = `<div class="panel">${html}</div>`;
}

function resetCombat() {
  combatState=null;
  document.getElementById('combat-content').innerHTML=`
    <div class="panel">
      <div class="panel-title">Выбери противника</div>
      <div class="monster-select-grid" id="monster-select"></div>
    </div>`;
  renderMonsterSelect();
}

// ── SAVED ─────────────────────────────────────────────
function renderSaved() {
  const saved = JSON.parse(localStorage.getItem('dnd_chars')||'[]');
  const el = document.getElementById('saved-list');
  if (saved.length===0) {
    el.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🏰</div>Отряд пуст.<br>Создай первого героя!</div>`;
    return;
  }
  el.innerHTML=saved.map((c,i)=>`
    <div class="saved-char" onclick="viewSaved(${i})">
      <div class="saved-char-emoji">${c.emoji}</div>
      <div class="saved-char-info">
        <div class="saved-char-name">${c.name}</div>
        <div class="saved-char-sub">${c.race} ${c.cls} · ${c.level} ур.</div>
      </div>
      <span style="color:var(--gold-dark)">›</span>
    </div>`).join('');
}

function viewSaved(i) {
  const saved = JSON.parse(localStorage.getItem('dnd_chars')||'[]');
  const c = saved[i];
  document.getElementById('nav-char').style.display='flex';
  switchTab('char', document.getElementById('nav-char'));
  renderCharacter(c, true);
}

selectDice(20, document.querySelectorAll('.dice-btn')[5]);
